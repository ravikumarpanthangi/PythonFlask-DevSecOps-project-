name: Flask DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/flask-devsecops
  DOCKER_TAG: ${{ github.sha }}

jobs:

  # ─────────────────────────────────────────
  # JOB 1: CODE QUALITY & LINT
  # ─────────────────────────────────────────
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint dependencies
        run: |
          pip install flake8 pylint
          pip install -r app/requirements.txt

      - name: Run flake8
        run: |
          flake8 app/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Run pylint
        run: |
          pylint app/*.py --disable=C0111,R0903 --fail-under=5.0 || true

  # ─────────────────────────────────────────
  # JOB 2: SECURITY SCAN (SAST)
  # ─────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit (SAST)
        run: pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ || true

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ─────────────────────────────────────────
  # JOB 3: UNIT TESTS
  # ─────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: ${{ secrets.MYSQL_DATABASE }}
          DB_USER: ${{ secrets.MYSQL_USER }}
          DB_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          pytest app/tests/ -v --cov=app --cov-report=xml --cov-report=term || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────
  # JOB 4: BUILD & PUSH DOCKER IMAGE
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [security-scan, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ─────────────────────────────────────────
  # JOB 5: DEPLOY TO EC2
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/PythonFlask-DevSecOps-project- || git clone ${{ github.server_url }}/${{ github.repository }}.git ~/PythonFlask-DevSecOps-project-

            git pull origin master

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker pull ${{ env.DOCKER_IMAGE }}:latest

            export MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            export MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            export MYSQL_USER=${{ secrets.MYSQL_USER }}
            export MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}

            docker-compose down
            docker-compose up -d

            docker image prune -f

            echo "✅ Deployment complete!"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 10
            docker ps
            docker-compose ps
            curl -f http://localhost:5000 && echo "✅ App is healthy!" || echo "❌ App health check failed!"

  # ─────────────────────────────────────────
  # JOB 6: NOTIFY
  # ─────────────────────────────────────────
  notify:
    name: 📢 Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint, security-scan, test, build-and-push, deploy]
    if: always()

    steps:
      - name: Pipeline Status
        run: |
          echo "======================================"
          echo "  PIPELINE SUMMARY"
          echo "======================================"
          echo "  Repo     : ${{ github.repository }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Author   : ${{ github.actor }}"
          echo "  Image    : ${{ env.DOCKER_IMAGE }}:latest"
          echo "======================================"
          echo "  Lint        : ${{ needs.lint.result }}"
          echo "  Security    : ${{ needs.security-scan.result }}"
          echo "  Tests       : ${{ needs.test.result }}"
          echo "  Docker Push : ${{ needs.build-and-push.result }}"
          echo "  Deploy      : ${{ needs.deploy.result }}"
          echo "======================================"
